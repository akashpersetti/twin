name: Deploy Digital Twin

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ secrets.DEFAULT_AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false  # Important: disable wrapper to get raw outputs

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Run Deployment Script
        run: |
          # Set environment variables for the script
          export AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          export DEFAULT_AWS_REGION=${{ secrets.DEFAULT_AWS_REGION }}
          
          # Make script executable and run it
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh ${{ github.event.inputs.environment || 'dev' }}
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          
      - name: Get Deployment URLs
        id: deploy_outputs
        working-directory: ./terraform
        run: |
          terraform workspace select ${{ github.event.inputs.environment || 'dev' }}
          echo "cloudfront_url=$(terraform output -raw cloudfront_url)" >> $GITHUB_OUTPUT
          echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT
          echo "api_url=$(terraform output -raw api_gateway_url)" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(terraform output -raw s3_frontend_bucket)" >> $GITHUB_OUTPUT
          echo "blog_content_bucket=$(terraform output -raw blog_content_bucket)" >> $GITHUB_OUTPUT
          echo "blog_site_bucket=$(terraform output -raw blog_site_bucket)" >> $GITHUB_OUTPUT
          echo "blog_cloudfront_distribution_id=$(terraform output -raw blog_cloudfront_distribution_id)" >> $GITHUB_OUTPUT
          echo "evals_bucket=$(terraform output -raw evals_bucket)" >> $GITHUB_OUTPUT

      - name: Invalidate CloudFront
        run: |
          DISTRIBUTION_ID="${{ steps.deploy_outputs.outputs.cloudfront_distribution_id }}"

          if [ "$DISTRIBUTION_ID" != "None" ] && [ -n "$DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DISTRIBUTION_ID" \
              --paths "/*"
          fi

      - name: Sync public blog
        run: |
          mkdir -p blog-frontend/content
          aws s3 sync s3://${{ steps.deploy_outputs.outputs.blog_content_bucket }}/published/ \
            blog-frontend/content/ --delete

          POST_COUNT=$(ls blog-frontend/content/*.md 2>/dev/null | wc -l | tr -d ' ')
          if [ "$POST_COUNT" -gt "0" ]; then
            cd blog-frontend
            npm install
            npm run build
            cd ..

            aws s3 sync blog-frontend/out/ \
              s3://${{ steps.deploy_outputs.outputs.blog_site_bucket }}/ --delete

            if [ -f blog-frontend/out/index.html ]; then
              aws s3 cp blog-frontend/out/index.html \
                s3://${{ steps.deploy_outputs.outputs.blog_site_bucket }}/index.html \
                --content-type "text/html" \
                --cache-control "max-age=0, no-cache, must-revalidate"
            fi
          else
            echo "No published posts yet — skipping blog build"
          fi

      - name: Invalidate blog CloudFront
        run: |
          BLOG_CF_ID="${{ steps.deploy_outputs.outputs.blog_cloudfront_distribution_id }}"
          if [ -n "$BLOG_CF_ID" ] && [ "$BLOG_CF_ID" != "None" ] && [ "$BLOG_CF_ID" != "" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$BLOG_CF_ID" \
              --paths "/*"
          fi

      - name: Deployment Summary
        run: |
          echo "✅ Deployment Complete!"
          echo "🌐 CloudFront URL: ${{ steps.deploy_outputs.outputs.cloudfront_url }}"
          echo "📡 API Gateway: ${{ steps.deploy_outputs.outputs.api_url }}"
          echo "🪣 Frontend Bucket: ${{ steps.deploy_outputs.outputs.frontend_bucket }}"

      - name: Check for backend/evals changes
        id: changed
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null | grep -qE '^(backend/|evals/)'; then
            echo "run_eval=true" >> "$GITHUB_OUTPUT"
          elif [ -z "${{ github.event.before }}" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "run_eval=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_eval=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run synthetic eval snapshot
        if: steps.changed.outputs.run_eval == 'true'
        working-directory: ./backend
        run: |
          uv sync
          uv run python ../evals/run_eval.py
          uv run python ../evals/upload_snapshot.py
        env:
          EVALS_BUCKET: ${{ steps.deploy_outputs.outputs.evals_bucket }}
          GITHUB_SHA: ${{ github.sha }}
          DEFAULT_AWS_REGION: ${{ secrets.DEFAULT_AWS_REGION }}
